# Loaded when running playbooks from this directory (cd ansible && ansible-playbook ...).
[defaults]
# Avoid noisy interpreter discovery warnings on macOS/Homebrew Python.
interpreter_python = auto_silent
# Prefer vendored roles (patched Monolith runner); Galaxy fallback for other roles.
roles_path = roles:.ansible/roles
# amazon.aws (AWS Secrets lookup) and other collections install here (ini key is collections_path).
collections_path = .ansible/collections:~/.ansible/collections
# Decrypt vault-encrypted files automatically (see .vault-password-file.example).
vault_password_file = .vault-password-file
