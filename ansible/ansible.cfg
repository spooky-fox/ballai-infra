# Loaded when running playbooks from this directory (cd ansible && ansible-playbook ...).
[defaults]
# Avoid noisy interpreter discovery warnings on macOS/Homebrew Python.
interpreter_python = auto_silent
# MonolithProjects github_actions_runner 1.27.0 uses `when: ... and runner_state|lower` (truthy str);
# ansible-core 2.20+ requires boolean conditionals unless this is set. Remove when upstream fixes.
allow_broken_conditionals = true
# Galaxy-installed roles land in .ansible/roles (gitignored); local roles/ is for Ballai-only wrappers.
roles_path = .ansible/roles:roles
# amazon.aws (AWS Secrets lookup) and other collections install here (ini key is collections_path).
collections_path = .ansible/collections:~/.ansible/collections
