---
# Provisions GitHub Actions self-hosted runners using MonolithProjects' Galaxy role
# (Linux + macOS), plus Ballai-specific extras on macOS (Homebrew gnu-tar, CI toolchain).
#
# Install role once: ansible-galaxy role install -r requirements.yml
#
# Secrets on the controller (chmod 600):
#   ansible/github_token — one-line PAT (repo scope for repo runners; or admin:org for org runners)
# Sudo / become (Monolith uses become for install dir, unarchive, config.sh; svc.sh stays non-root on Darwin):
#   Prefer ansible/.pw (single line), else ansible/become_password, else env ANSIBLE_BECOME_PASSWORD,
#   else AWS Secrets Manager when BALLAI_ANSIBLE_BECOME_SECRET_ID is set (needs amazon.aws collection).
#   Optional: scripts/sync_ansible_secrets_from_aws.sh writes .pw from AWS (see README).
#
# Extend later: org runners (runner_org, github_account), GHES (github_api_url, runner_on_ghes),
# ephemeral runners (runner_extra_config_args), proxy (custom_env), multiple repos
# (all_runners_in_same_repo: false). See role README:
# https://github.com/MonolithProjects/ansible-github_actions_runner
#
# Multi-host: list each runner under [github_runners] in inventory (see inventory.example).
# Use ansible_host=<LAN-IP> or <LocalHostName>.local; `host *.local` often NXDOMAIN (unicast DNS
# ≠ mDNS). Prefer a reserved DHCP / static IP if .local fails from the controller.
#
- name: GitHub Actions self-hosted runner (MonolithProjects + Ballai extras)
  # Union so existing inventories using [mac_runners] keep working.
  hosts: github_runners:mac_runners
  gather_facts: false
  # Do not set become: true here — gather_facts would run before pre_tasks load .pw / Secrets Manager.
  become: false

  vars:
    github_account: spooky-fox
    github_repo: ballai
    runner_user: "{{ ansible_user }}"
    runner_dir: "{{ ansible_facts['env']['HOME'] }}/actions-runner"
    runner_labels:
      - ballai-ci
    runner_org: false
    # Map legacy Ballai variable names to the Monolith role.
    runner_version: "{{ github_actions_runner_version | default('latest') }}"
    reinstall_runner: "{{ github_actions_runner_replace | default(false) | bool }}"
    runner_state: "{{ 'started' if (github_actions_runner_install_service | default(true) | bool) else 'stopped' }}"
    # Controller-side paths (empty = ansible/github_token next to playbooks/)
    github_actions_runner_github_token_file: ""
    github_actions_runner_become_password_file: ""
    ballai_runner_install_ci_tools: "{{ github_actions_runner_install_ci_tools | default(true) | bool }}"
    # Shared machines: set ballai_runner_shared_machine=true in host_vars to skip casks/network tools.
    # LaunchDaemon: set ballai_runner_use_launchdaemon=true in host_vars for boot-time runner service.
    _shared_machine: "{{ ballai_runner_shared_machine | default(false) | bool }}"
    _use_launchdaemon: "{{ ballai_runner_use_launchdaemon | default(false) | bool }}"
    # Xcode and simulator setup.
    ballai_runner_install_xcode: "{{ github_actions_runner_install_xcode | default(true) | bool }}"
    ballai_runner_ios_simulator_platform: iOS
    # Android tooling is optional and disabled by default (large install footprint).
    ballai_runner_install_android_tools: "{{ github_actions_runner_install_android_tools | default(false) | bool }}"
    ballai_runner_install_android_emulator_stack: "{{ github_actions_runner_install_android_emulator_stack | default(false) | bool }}"
    ballai_runner_android_sdk_root: "{{ ansible_facts['env']['HOME'] }}/Library/Android/sdk"
    ballai_runner_android_api_level: "{{ github_actions_runner_android_api_level | default('35') }}"
    ballai_runner_android_system_image: "{{ github_actions_runner_android_system_image | default('google_apis_playstore') }}"
    ballai_runner_android_abi: "{{ github_actions_runner_android_abi | default('arm64-v8a') }}"
    # Plain secret id or ARN; set via env for CI/automation (requires ansible-galaxy collection install amazon.aws).
    ballai_ansible_become_secret_id: "{{ lookup('env', 'BALLAI_ANSIBLE_BECOME_SECRET_ID') | default('', true) }}"

  pre_tasks:
    # ── Tailscale → LAN fallback ────────────────────────────────────────
    - name: Probe Tailscale connectivity
      ansible.builtin.command:
        cmd: "timeout 10 nc -z -w 5 {{ ballai_tailscale_host }} 22"
      delegate_to: localhost
      connection: local
      register: _ts_probe
      ignore_errors: true
      changed_when: false
      check_mode: false
      when: ballai_tailscale_host | default('') | length > 0
      tags: [always]

    - name: Fall back to LAN/Bonjour when Tailscale is unreachable
      ansible.builtin.set_fact:
        ansible_host: "{{ ballai_fallback_host }}"
      when:
        - ballai_fallback_host | default('') | length > 0
        - _ts_probe is failed or _ts_probe is skipped
      tags: [always]

    - name: Report selected host
      ansible.builtin.debug:
        msg: "Connecting to {{ inventory_hostname }} via {{ ansible_host }}"
      tags: [always]

    - name: Gather facts
      ansible.builtin.setup:
      tags: [always]

    - name: Require ansible-core 2.20 or newer
      ansible.builtin.assert:
        that:
          - ansible_version.major | int > 2 or
            (ansible_version.major | int == 2 and ansible_version.minor | int >= 20)
        fail_msg: >-
          Install ansible-core 2.20+ (cd ansible && uv sync) or use a venv +
          pip install -r ansible/requirements.txt.
      tags: [always]

    - name: Normalize runner_labels to a list when passed as a string (-e runner_labels=a,b)
      ansible.builtin.set_fact:
        runner_labels: "{{ runner_labels.split(',') | map('trim') | reject('equalto', '') | list }}"
      when: runner_labels is string
      tags: [always]

    - name: Normalize pinned runner_version (Monolith tarball URLs use v2.3.4 with no leading v in var)
      ansible.builtin.set_fact:
        runner_version: "{{ (runner_version | string) | regex_replace('^v', '') }}"
      when: (runner_version | string) != 'latest'
      tags: [always]

    - name: Resolve GitHub token file path on controller
      ansible.builtin.set_fact:
        _github_token_path: >-
          {{
            github_actions_runner_github_token_file
            if (github_actions_runner_github_token_file | default('') | length > 0)
            else ((playbook_dir | dirname) ~ '/github_token')
          }}
      tags: [always]

    - name: Stat GitHub token file on controller
      ansible.builtin.stat:
        path: "{{ _github_token_path }}"
      delegate_to: localhost
      connection: local
      register: _gh_tok_stat
      tags: [always]

    - name: Set access_token from vault
      ansible.builtin.set_fact:
        access_token: "{{ vault_github_token }}"
      when: vault_github_token | default('') | length > 0
      no_log: true
      tags: [always]

    - name: Set access_token from file on controller
      ansible.builtin.set_fact:
        access_token: "{{ lookup('file', _github_token_path) | trim }}"
      when:
        - access_token | default('') | length == 0
        - _gh_tok_stat.stat.exists | default(false)
      no_log: true
      tags: [always]

    - name: Set access_token from environment
      ansible.builtin.set_fact:
        access_token: >-
          {{
            lookup('env', 'GITHUB_TOKEN')
            | default(lookup('env', 'PERSONAL_ACCESS_TOKEN'), true)
            | default('', true)
          }}
      when:
        - access_token | default('') | length == 0
        - not (_gh_tok_stat.stat.exists | default(false))
      no_log: true
      tags: [always]

    # Become password: vault → explicit path → .pw → become_password → ANSIBLE_BECOME_PASSWORD → AWS Secrets Manager
    - name: Load ansible_become_password from vault
      ansible.builtin.set_fact:
        ansible_become_password: "{{ vault_become_password }}"
      when: vault_become_password | default('') | length > 0
      no_log: true
      tags: [always]
    - name: Search for become password file
      ansible.builtin.stat:
        path: "{{ item }}"
      delegate_to: localhost
      connection: local
      become: false
      register: _become_pw_candidates
      loop:
        - "{{ github_actions_runner_become_password_file | default('') }}"
        - "{{ (playbook_dir | dirname) ~ '/.pw' }}"
        - "{{ (playbook_dir | dirname) ~ '/become_password' }}"
      when:
        - _become_password_path is not defined
        - item | length > 0
      tags: [always]

    - name: Use first existing become password file
      ansible.builtin.set_fact:
        _become_password_path: "{{ item.item }}"
      loop: "{{ _become_pw_candidates.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('skipped') }}"
      when:
        - _become_password_path is not defined
        - item.stat is defined
        - item.stat.exists | default(false)
      tags: [always]

    - name: Load ansible_become_password from file
      ansible.builtin.set_fact:
        ansible_become_password: "{{ lookup('file', _become_password_path) | trim }}"
      when: _become_password_path is defined
      no_log: true
      tags: [always]

    - name: Load ansible_become_password from environment
      ansible.builtin.set_fact:
        ansible_become_password: "{{ lookup('env', 'ANSIBLE_BECOME_PASSWORD') | trim }}"
      when:
        - (ansible_become_password | default('') | length) == 0
        - (lookup('env', 'ANSIBLE_BECOME_PASSWORD') | default('', true) | length) > 0
      no_log: true
      tags: [always]

    - name: Load ansible_become_password from AWS Secrets Manager
      ansible.builtin.set_fact:
        ansible_become_password: "{{ lookup('amazon.aws.aws_secret', ballai_ansible_become_secret_id) | trim }}"
      when:
        - (ansible_become_password | default('') | length) == 0
        - ballai_ansible_become_secret_id | default('') | length > 0
      no_log: true
      tags: [always]

    - name: Resolve Homebrew executable (macOS)
      ansible.builtin.shell: command -v brew
      args:
        executable: /bin/bash
      environment:
        PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('') }}"
      register: _brew_cmd
      changed_when: false
      check_mode: false
      become: false
      when: ansible_facts.system == 'Darwin'
      tags: [always]

    - name: Require Homebrew on macOS runner hosts
      ansible.builtin.assert:
        that:
          - _brew_cmd.rc == 0
          - _brew_cmd.stdout | length > 0
        fail_msg: >-
          Install Homebrew (https://brew.sh). gnu-tar is required so Ansible unarchive can use gtar.
      when: ansible_facts.system == 'Darwin'
      tags: [always]

    - name: Ensure GNU tar formula (macOS) so ansible unarchive finds gtar
      community.general.homebrew:
        name: gnu-tar
        state: present
      become: false
      when: ansible_facts.system == 'Darwin'
      tags: [always]

  roles:
    - role: monolithprojects.github_actions_runner

  post_tasks:
    - name: Ensure CI tool formulae (macOS)
      community.general.homebrew:
        name:
          - swiftlint
          - xcodegen
          - xcbeautify
          - jq
          - gh
          - coreutils
          - node
          - wget
          - yq
          - awscli
          - mas
        state: present
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_ci_tools | bool
      tags: [ci-tools]

    - name: Ensure network diagnostic tools (macOS)
      community.general.homebrew:
        name:
          - mtr
          - nmap
          - telnet
        state: present
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_ci_tools | bool
        - not _shared_machine
      tags: [ci-tools]

    - name: Ensure CI tool casks (macOS)
      community.general.homebrew_cask:
        name:
          - 1password
          - 1password-cli
        state: present
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_ci_tools | bool
        - not _shared_machine
      tags: [ci-tools]

    # ── Xcode setup ──────────────────────────────────────────────────────
    - name: Check if Xcode.app is installed
      ansible.builtin.stat:
        path: /Applications/Xcode.app
      register: _xcode_app
      when: ansible_facts.system == 'Darwin'
      tags: [xcode]

    - name: Install Xcode from App Store via mas
      ansible.builtin.command:
        cmd: mas install 497799835
      environment:
        PATH: "/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('') }}"
      become: true
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_xcode | bool
        - not (_xcode_app.stat.exists | default(false))
      changed_when: true
      tags: [xcode]

    - name: Point xcode-select at Xcode.app
      ansible.builtin.command:
        cmd: xcode-select -s /Applications/Xcode.app/Contents/Developer
      become: true
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_xcode | bool
      changed_when: false
      tags: [xcode]

    - name: Accept Xcode license
      ansible.builtin.command:
        cmd: xcodebuild -license accept
      become: true
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_xcode | bool
      changed_when: false
      tags: [xcode]

    - name: Run Xcode first launch setup
      ansible.builtin.command:
        cmd: xcodebuild -runFirstLaunch
      become: true
      register: _xcode_first_launch
      failed_when: _xcode_first_launch.rc not in [0, 69]
      changed_when: _xcode_first_launch.rc == 0
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_xcode | bool
      tags: [xcode]

    - name: Check installed iOS simulator runtimes
      ansible.builtin.command:
        cmd: xcrun simctl list runtimes -j
      register: _sim_runtimes
      changed_when: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_xcode | bool
      tags: [xcode]

    - name: Download latest iOS simulator if missing
      ansible.builtin.command:
        cmd: "xcodebuild -downloadPlatform {{ ballai_runner_ios_simulator_platform }}"
      register: _sim_download
      failed_when:
        - _sim_download.rc != 0
        - "'Duplicate' not in _sim_download.stdout"
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_xcode | bool
        - >-
          (_sim_runtimes.stdout | from_json).runtimes
          | selectattr('platform', 'equalto', 'iOS')
          | selectattr('isAvailable', 'equalto', true)
          | list | length == 0
      changed_when: _sim_download.rc == 0
      tags: [xcode]

    # ── LaunchDaemon for shared machines ─────────────────────────────────
    - name: Install runner LaunchDaemon (shared machines)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/runner-launchdaemon.plist.j2"
        dest: /Library/LaunchDaemons/com.github.actions.runner.plist
        owner: root
        group: wheel
        mode: "0644"
      become: true
      when:
        - ansible_facts.system == 'Darwin'
        - _use_launchdaemon
      notify: reload runner launchdaemon
      tags: [runner-service]

    - name: Ensure NOPASSWD sudo for runner user (shared machines)
      ansible.builtin.lineinfile:
        path: "/etc/sudoers.d/{{ runner_user }}"
        line: "{{ runner_user }} ALL=(ALL) NOPASSWD: ALL"
        create: true
        owner: root
        group: wheel
        mode: "0440"
        validate: "visudo -cf %s"
      become: true
      when:
        - ansible_facts.system == 'Darwin'
        - _use_launchdaemon
      tags: [runner-service]

    - name: Ensure Android Homebrew formulae (macOS)
      community.general.homebrew:
        name:
          - openjdk
          - android-platform-tools
        state: present
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_android_tools | bool
      tags: [android-tools]

    - name: Ensure Android command line tools cask (macOS)
      community.general.homebrew_cask:
        name:
          - android-commandlinetools
        state: present
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_android_tools | bool
      tags: [android-tools]

    - name: Ensure Android SDK root exists (macOS)
      ansible.builtin.file:
        path: "{{ ballai_runner_android_sdk_root }}"
        state: directory
        mode: "0755"
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_android_tools | bool
      tags: [android-tools]

    - name: Ensure Android SDK cmdline-tools latest is installed
      ansible.builtin.command:
        argv:
          - sdkmanager
          - "--sdk_root={{ ballai_runner_android_sdk_root }}"
          - cmdline-tools;latest
      environment:
        PATH: "/opt/homebrew/opt/openjdk/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('') }}"
        ANDROID_SDK_ROOT: "{{ ballai_runner_android_sdk_root }}"
      changed_when: false
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_android_tools | bool
      tags: [android-tools]

    - name: Accept Android SDK licenses (idempotent)
      ansible.builtin.shell: |
        set -o pipefail
        yes | sdkmanager --sdk_root="{{ ballai_runner_android_sdk_root }}" --licenses
      args:
        executable: /bin/bash
      environment:
        PATH: "/opt/homebrew/opt/openjdk/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('') }}"
        ANDROID_SDK_ROOT: "{{ ballai_runner_android_sdk_root }}"
      register: _android_license_result
      failed_when: _android_license_result.rc not in [0, 141]
      changed_when: false
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_android_tools | bool
      tags: [android-tools]

    - name: Ensure Android emulator stack packages are installed
      ansible.builtin.command:
        argv:
          - sdkmanager
          - "--sdk_root={{ ballai_runner_android_sdk_root }}"
          - platform-tools
          - emulator
          - "platforms;android-{{ ballai_runner_android_api_level }}"
          - "system-images;android-{{ ballai_runner_android_api_level }};{{ ballai_runner_android_system_image }};{{ ballai_runner_android_abi }}"
      environment:
        PATH: "/opt/homebrew/opt/openjdk/bin:/opt/homebrew/bin:/usr/local/bin:{{ ansible_facts['env']['PATH'] | default('') }}"
        ANDROID_SDK_ROOT: "{{ ballai_runner_android_sdk_root }}"
      changed_when: false
      become: false
      when:
        - ansible_facts.system == 'Darwin'
        - ballai_runner_install_android_tools | bool
        - ballai_runner_install_android_emulator_stack | bool
      tags: [android-tools]

  handlers:
    - name: reload runner launchdaemon
      ansible.builtin.shell: |
        launchctl unload /Library/LaunchDaemons/com.github.actions.runner.plist 2>/dev/null || true
        launchctl load /Library/LaunchDaemons/com.github.actions.runner.plist
      become: true
