name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    name: apply (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-apply-${{ github.repository }}-${{ matrix.workspace }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - environments/prod
          - environments/prod/lanzo-web
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Require remote backend
        run: |
          if [ ! -f backend.tf ]; then
            echo "backend.tf is missing in ${PWD}. Configure remote state before apply."
            exit 1
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
