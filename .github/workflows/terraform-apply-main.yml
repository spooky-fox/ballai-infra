name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".github/workflows/terraform-apply-main.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    name: apply (${{ matrix.workspace }})
    runs-on: ${{ vars.USE_CODEBUILD_RUNNERS == 'true' && (matrix.workspace == 'environments/prod' && format('codebuild-ballai-gha-ballai-infra-prod-{0}-{1}', github.run_id, github.run_attempt) || format('codebuild-ballai-gha-ballai-infra-lanzo-web-{0}-{1}', github.run_id, github.run_attempt)) || 'ubuntu-latest' }}
    environment: production
    concurrency:
      group: terraform-apply-${{ github.repository }}-${{ matrix.workspace }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - environments/prod
          - environments/prod/lanzo-web
    defaults:
      run:
        working-directory: ${{ matrix.workspace }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Require remote backend
        run: |
          if [ ! -f backend.tf ]; then
            echo "backend.tf is missing in ${PWD}. Configure remote state before apply."
            exit 1
          fi

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Preflight destructive change check
        run: ${GITHUB_WORKSPACE}/scripts/terraform-preflight.sh check-plan tfplan
        env:
          TERRAFORM_DESTRUCTIVE_ALLOWLIST: "339713066518"

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
