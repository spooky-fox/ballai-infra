import:
  - orgs/spookyfox/plat/usw2/_defaults

# ──────────────────────────────────────────────────────────────────────
# Component ownership split (see issue #27)
#
# Legacy path (environments/prod/) — managed by CI (GitHub Actions):
#   - ballai-worker
#   - worker-oidc-federation
#   - github-actions-codebuild-runners
#
# Those components are NOT declared here to avoid dual-management.
# They will move into this Atmos stack once CI is migrated.
# ──────────────────────────────────────────────────────────────────────

components:
  terraform:
    shared-infra:
      backend:
        s3:
          key: "shared-infra/terraform.tfstate"
      vars: {}

    service-agent-memory:
      backend:
        s3:
          key: "service-agent-memory/terraform.tfstate"
      vars: {}

    service-phoenix:
      backend:
        s3:
          key: "service-phoenix/terraform.tfstate"
      vars: {}
